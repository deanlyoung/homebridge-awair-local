name: Test and publish

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run lint
      - run: npm test
      - name: Verify published package contents
        run: npm pack --dry-run

  publish-npm:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
      - name: Create release tag
        id: release_tag
        run: |
          VERSION="$(jq -r '.version' package.json)"
          TAG="v${VERSION}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"

          if git rev-parse -q --verify "refs/tags/${TAG}" > /dev/null; then
            TAG_COMMIT="$(git rev-list -n 1 "${TAG}")"
            if [ "${TAG_COMMIT}" = "${GITHUB_SHA}" ]; then
              echo "publish=false" >> "${GITHUB_OUTPUT}"
              exit 0
            fi

            echo "Tag ${TAG} already exists for a different commit." >&2
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Release ${VERSION}" "${GITHUB_SHA}"
          git push origin "${TAG}"
          echo "publish=true" >> "${GITHUB_OUTPUT}"
      - name: Publish to npm
        if: steps.release_tag.outputs.publish == 'true'
        run: npm publish
      - name: Ensure GitHub release notes exist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${{ steps.release_tag.outputs.tag }}" \
            || gh release create "${{ steps.release_tag.outputs.tag }}" --generate-notes --title "${{ steps.release_tag.outputs.tag }}"
